spring.application.name=LinkVault

spring.datasource.url=jdbc:postgresql://postgres:5432/linkvault_db
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# Exp�e o endpoint /actuator/prometheus
management.endpoints.web.exposure.include=health,info,prometheus

# Opcional: Adiciona tags para facilitar a filtragem no Grafana
management.metrics.tags.application=LinkVault