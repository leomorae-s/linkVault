<div class="bg-white border-2 border-black shadow-[6px_6px_0_#000] p-5">
  <div class="font-mono font-bold text-xl uppercase tracking-wide text-black mb-1">
    {{ title || 'Sem título' }}
  </div>

  @if (createdAt) {
  <div class="font-mono text-[11px] text-[#888] mb-3">
    Salvo em {{ createdAt }}
  </div>
  }

  @if (link) {
  <a [attr.href]="link" target="_blank" rel="noopener" class="font-mono text-[12px] text-black underline break-all">
    {{ link }}
  </a>
  }

  @if (description) {
  <p class="font-mono text-[12px] text-[#444] mt-2 mb-0">
    {{ description }}
  </p>
  }

  <div class="flex gap-2 mt-4 pt-4 border-t border-[#e0e0e0]">
    <ng-content />
  </div>
</div>
