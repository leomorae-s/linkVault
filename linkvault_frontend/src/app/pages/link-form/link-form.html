<div class="max-w-[480px] mx-auto px-4 py-8">

  <div class="font-mono text-[11px] uppercase tracking-widest text-[#888] mb-1">
    // Formulário
  </div>
  <h1 class="font-mono font-bold text-4xl uppercase leading-none text-black mb-6">
    {{ editId ? 'EDITAR' : 'SALVAR' }}<br>UM LINK.
  </h1>

  <div class="border-2 border-black bg-white shadow-[6px_6px_0_#000] p-6">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="flex flex-col gap-6">

        <app-input label="Link" placeholder="https://exemplo.com" type="url" [control]="getControl('link')" />

        <app-input label="Descrição" placeholder="Sobre o que é este link..." [multiline]="true"
          [control]="getControl('description')" />

        <div class="flex flex-col gap-3 mt-2">
          <app-button type="submit" variant="primary" [disabled]="form.invalid">
            ✓ Salvar
          </app-button>
          <app-button type="button" variant="secondary" routerLink="/">
            Cancelar
          </app-button>
        </div>

      </div>
    </form>
  </div>

  <p class="font-mono text-[11px] text-[#888] mt-4">
    [ DICA ] Algo legal que ainda irei decidir pra colocar aqui.
  </p>

</div>
