<div class="max-w-[480px] my-12 mx-auto p-8 bg-white rounded-lg border border-[#f0f0f0 shadow-sm]">
  <h2 class="text-lg font-medium mb-6 text-[#262626]">{{ editingId ? 'Editar Link' : 'Novo Link' }}</h2>

  <form nz-form nzLayout="vertical" [formGroup]="form" (ngSubmit)="submit()">
    <nz-form-item>
      <nz-form-label nzRequired>URL</nz-form-label>
      <nz-form-control nzErrorTip="Insira uma URL válida">
        <input nz-input formControlName="link" placeholder="https://..." />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label>Descrição</nz-form-label>
      <nz-form-control>
        <input nz-input formControlName="description" placeholder="Descrição opcional" />
      </nz-form-control>
    </nz-form-item>

    <div class="flex justify-end gap-2 mt-2">
      <button nz-button nzType="default" type="button" (click)="cancel()">Cancelar</button>
      <button nz-button nzType="primary" type="submit" [disabled]="form.invalid">Salvar</button>
    </div>
  </form>
</div>
